name: Build Extensions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [cxone, airtable, crypto, flow-control]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Transpile ${{ matrix.package }}
        run: npm run transpile --workspace=packages/${{ matrix.package }}

      - name: Lint ${{ matrix.package }}
        run: npm run lint --workspace=packages/${{ matrix.package }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: packages/${{ matrix.package }}/*.tar.gz
          if-no-files-found: ignore
