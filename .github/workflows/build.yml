name: Build Extensions

on:
  pull_request:
    branches: [main]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main
        run: git fetch origin main

      - name: Detect changed packages
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          PKGS=()
          for PKG in airtable crypto cxone flow-control; do
            if echo "$CHANGED" | grep -q "^packages/$PKG/"; then
              PKGS+=("$PKG")
            fi
          done

          if [ ${#PKGS[@]} -eq 0 ]; then
            echo "No package changes detected — nothing to build."
            echo 'packages=[]' >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${PKGS[@]}" | jq -R . | jq -sc .)
            echo "Changed packages: $JSON"
            echo "packages=$JSON" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Transpile ${{ matrix.package }}
        run: npm run transpile --workspace=packages/${{ matrix.package }}

      - name: Lint ${{ matrix.package }}
        run: npm run lint --workspace=packages/${{ matrix.package }}
