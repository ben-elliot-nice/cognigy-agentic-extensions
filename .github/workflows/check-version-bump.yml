name: Check version bump

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    name: Verify version was bumped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main and tags
        run: |
          git fetch origin main
          git fetch --tags

      - name: Check version bumps
        run: |
          set -e

          CHANGED=$(git diff --name-only origin/main...HEAD)
          PACKAGES=(airtable crypto cxone flow-control)
          ANY_SOURCE=false
          FAILED=false

          for PKG in "${PACKAGES[@]}"; do
            PKG_CHANGED=$(echo "$CHANGED" | grep "^packages/$PKG/" || true)

            if [ -z "$PKG_CHANGED" ]; then
              continue
            fi

            ANY_SOURCE=true
            echo "[$PKG] Source changes detected:"
            echo "$PKG_CHANGED"
            echo ""

            CURRENT=$(jq -r '.version' "packages/$PKG/package.json")

            # Gate against the last production release, not main.
            # This allows multiple PRs to stack at the same version without runaway bumps.
            LATEST_PROD=$(git tag -l "${PKG}-v[0-9]*" | grep -v '\-rc\.' | sort -V | tail -1 | sed "s/${PKG}-v//")

            if [ -z "$LATEST_PROD" ]; then
              echo "[$PKG] No production release yet — current: $CURRENT ✓"
              echo ""
              continue
            fi

            echo "[$PKG] last prod: v$LATEST_PROD"
            echo "[$PKG] current:   v$CURRENT"

            HIGHER=$(printf '%s\n%s\n' "$LATEST_PROD" "$CURRENT" | sort -V | tail -1)
            if [ "$CURRENT" = "$LATEST_PROD" ] || [ "$HIGHER" != "$CURRENT" ]; then
              echo "::error::[$PKG] v$CURRENT is not greater than the last production release v$LATEST_PROD. Bump package.json to a higher version."
              FAILED=true
            else
              echo "[$PKG] v$CURRENT > v$LATEST_PROD ✓"
            fi

            echo ""
          done

          if [ "$ANY_SOURCE" = "false" ]; then
            echo "No package source changes detected — version check not required."
            exit 0
          fi

          if [ "$FAILED" = "true" ]; then
            exit 1
          fi

          echo "All changed packages are at a version above the last production release."
